version: 2

models:
  - name: fct_orders
    description: "Fact table storing order transactions"

    columns:
      - name: order_key
        description: "Unique surrogate key for each order"
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - relationships:
              to: ref('stg_customers')
              field: customer_id